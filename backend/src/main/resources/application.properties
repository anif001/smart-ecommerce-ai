# Server Port
server.port=8080

# Spring Data MongoDB Configuration
spring.data.mongodb.uri=${SPRING_MONGO_URI:mongodb://localhost:27017/ecommerce}

# ML Microservice Endpoint
ml.service.url=${ML_SERVICE_URL:http://localhost:8000}

# JWT Security Configurations
jwt.secret=${JWT_SECRET:dGhpcy1pcy1hLWRldmVsb3BtZW50LW9ubHktamF3dC1zZWNyZXQta2V5LWZvci10ZXN0aW5nLXB1cnBvc2VzLWFuZC1ub3QtZm9yLXByb2R1Y3Rpb24=}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Razorpay Payment Gateway Configuration
razorpay.key=${RAZORPAY_KEY:rzp_test_placeholder_key}
razorpay.secret=${RAZORPAY_SECRET:rzp_test_placeholder_secret}

# Email Configuration (Gmail SMTP)
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Application Base URL (for email links and payment redirects)
app.base-url=${APP_BASE_URL:http://localhost:8080}
app.frontend-url=${FRONTEND_URL:http://localhost:5173}

# Tax Configuration
app.tax.percentage=${TAX_PERCENTAGE:18}
app.shipping.free-threshold=${FREE_SHIPPING_THRESHOLD:500}
app.shipping.cost=${SHIPPING_COST:40}

# Logging Configurations
logging.level.org.springframework.web=INFO
logging.level.com.ecommerce=DEBUG

# Enable detailed stack traces for development
server.error.include-message=always
server.error.include-binding-errors=always
